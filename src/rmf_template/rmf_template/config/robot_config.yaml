# RMF Template - Robot Fleet Config
# Copy from rmf_template_fleet_adapter/config.yaml and customize here

rmf_fleet:
  name: "my_fleet"
  fleet_manager:
    ip: "127.0.0.1"        # TODO: Your robot's IP
    port: 22011             # TODO: Your robot's port
    user: "admin"
    password: "password"
  limits:
    linear: [0.5, 0.75]
    angular: [0.6, 2.0]
  profile:
    footprint: 0.3
    vicinity: 0.5
  reversible: true
  battery_system:
    voltage: 24.0
    capacity: 40.0
    charging_current: 10.0
  mechanical_system:
    mass: 50.0
    moment_of_inertia: 20.0
    friction_coefficient: 0.22
  ambient_system:
    power: 20.0
  tool_system:
    power: 0.0
  recharge_threshold: 0.10
  recharge_soc: 1.0
  account_for_battery_drain: true
  publish_fleet_state: 10
  task_capabilities:
    finishing_request: "park"
    loop: true
    delivery: true
    clean: false

robots:
  Robot1:                   # TODO: Your robot name
    robot_config:
      max_delay: 15.0
    rmf_config:
      start:
        map_name: "L1"      # TODO: Must match nav_graph level
        waypoint: "start"   # TODO: Starting waypoint
        orientation: 0.0
      charger:
        waypoint: "charger"
      robot_state_update_frequency: 1  # Low for LoRa!
